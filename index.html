@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap');
:root{
  --bg:#0C1310;--bg2:#111914;--card:#15201A;--card2:#1A261F;
  --line:rgba(255,255,255,.05);--line2:rgba(255,255,255,.12);--border:#27332C;
  --text:#EEF2EC;--muted:#9CABA1;--dim:#6C7A72;
  --up:#4FD08A;--down:#F26B6B;--gold:#EAB44E;--teal:#5BB4C4;
  --grad:radial-gradient(130% 150% at 85% -25%,rgba(234,180,78,.12),transparent 60%);
  --display:'Space Grotesk',-apple-system,system-ui,sans-serif;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,system-ui,sans-serif;
  --mono:ui-monospace,'SF Mono','JetBrains Mono','Roboto Mono',Menlo,monospace;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
.vb-root{background:var(--bg);min-height:100vh;min-height:100dvh;color:var(--text);font-family:var(--sans);font-size:15px;line-height:1.42;letter-spacing:-.01em;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
.vb-root input,.vb-root textarea,.vb-root select{-webkit-user-select:text;user-select:text;}
.vb-center{display:flex;align-items:center;justify-content:center;min-height:100vh;}
.vb-mono{font-family:var(--mono);font-variant-numeric:tabular-nums;letter-spacing:-.02em;}
.up{color:var(--up);}.down{color:var(--down);}.neutral{color:var(--muted);}
.vb-gold{color:var(--gold);}.vb-dot{color:var(--dim);margin:0 .35em;}
.vb-shell{max-width:540px;margin:0 auto;min-height:100vh;min-height:100dvh;position:relative;background:linear-gradient(180deg,#0E1612,#0C1310);}
.vb-main{padding-bottom:calc(96px + env(safe-area-inset-bottom));}
.vb-screen{padding:14px 16px 0;}
.vb-header{position:sticky;top:0;z-index:30;display:flex;align-items:center;justify-content:space-between;padding:calc(12px + env(safe-area-inset-top)) 16px 12px;background:rgba(12,19,16,.82);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);}
.vb-brand{display:flex;align-items:center;gap:8px;}
.vb-brand-mark{color:var(--gold);font-size:18px;transform:translateY(-1px);}
.vb-brand-name{font-family:var(--display);font-weight:700;font-size:18px;letter-spacing:-.02em;}
.vb-header-right{display:flex;align-items:center;gap:6px;}
.vb-save{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;color:var(--dim);min-width:42px;transition:opacity .3s;font-family:var(--mono);}
.vb-save.saved{color:var(--up);}
.vb-icon-btn{background:transparent;border:none;color:var(--muted);padding:7px;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s;}
.vb-icon-btn:hover{color:var(--text);background:var(--card);}
.vb-icon-btn.on{color:var(--gold);background:rgba(234,180,78,.12);}
.vb-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:540px;z-index:40;display:flex;align-items:flex-end;justify-content:space-around;padding:8px 10px calc(8px + env(safe-area-inset-bottom));background:rgba(14,21,17,.92);backdrop-filter:blur(16px);border-top:1px solid var(--line);}
.vb-nav-btn{flex:1;background:none;border:none;color:var(--dim);display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;font-size:10.5px;font-weight:500;cursor:pointer;transition:.15s;}
.vb-nav-btn.active{color:var(--gold);}
.vb-fab{flex:0 0 auto;width:54px;height:54px;border-radius:50%;border:none;cursor:pointer;background:linear-gradient(145deg,#F2C062,#D89A35);color:#1A1206;display:flex;align-items:center;justify-content:center;margin:0 6px -10px;box-shadow:0 6px 20px rgba(234,180,78,.35),inset 0 1px 0 rgba(255,255,255,.3);transition:.12s;}
.vb-fab:active{transform:scale(.93);}
.vb-toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);z-index:80;display:flex;align-items:center;gap:7px;background:var(--card2);border:1px solid var(--border);color:var(--text);font-size:13.5px;font-weight:600;padding:11px 16px;border-radius:13px;box-shadow:0 8px 30px rgba(0,0,0,.5);animation:toastin .25s cubic-bezier(.2,.8,.2,1);max-width:90%;}
.vb-toast.good{border-color:rgba(79,208,138,.4);}.vb-toast.good svg{color:var(--up);}
.vb-toast.bad{border-color:rgba(242,107,107,.4);}.vb-toast.bad svg{color:var(--down);}
@keyframes toastin{from{opacity:0;transform:translate(-50%,12px);}to{opacity:1;transform:translate(-50%,0);}}
.vb-hero{background:var(--card);border:1px solid var(--border);border-radius:22px;padding:18px 18px 6px;position:relative;overflow:hidden;background-image:var(--grad);}
.vb-hero-top{display:flex;justify-content:space-between;align-items:flex-start;}
.vb-eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--dim);font-weight:600;}
.vb-balance{font-family:var(--display);font-size:38px;font-weight:700;letter-spacing:-.03em;margin-top:3px;font-variant-numeric:tabular-nums;}
.vb-hero-sub{margin-top:2px;font-size:13px;font-family:var(--mono);}
.vb-chip{display:inline-flex;align-items:center;gap:5px;background:var(--card2);border:1px solid var(--border);color:var(--text);font-size:12.5px;font-weight:500;padding:7px 11px;border-radius:11px;cursor:pointer;transition:.15s;}
.vb-chip:hover{border-color:var(--gold);}
.vb-hero-chart{height:88px;margin:6px -6px 0;}
.vb-chart-empty{height:100%;display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:12.5px;text-align:center;padding:0 20px;}
.vb-seg{display:flex;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:3px;margin:16px 0 4px;gap:2px;}
.vb-seg button{flex:1;background:none;border:none;color:var(--muted);font-size:12.5px;font-weight:600;padding:8px 4px;border-radius:9px;cursor:pointer;transition:.15s;}
.vb-seg button.on{background:var(--card2);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.3);}
.vb-stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:12px 0;}
.vb-stat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px 11px;}
.vb-stat-label{font-size:10.5px;color:var(--dim);font-weight:600;text-transform:uppercase;letter-spacing:.06em;}
.vb-stat-value{font-family:var(--mono);font-size:18px;font-weight:600;margin-top:5px;letter-spacing:-.03em;}
.vb-stat-sub{font-size:11px;color:var(--muted);margin-top:2px;font-family:var(--mono);}
.vb-streak{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;padding:7px 12px;border-radius:11px;margin:4px 0 8px;}
.vb-streak.up{background:rgba(79,208,138,.12);color:var(--up);}
.vb-streak.down{background:rgba(242,107,107,.12);color:var(--down);}
.vb-section{margin-top:18px;}
.vb-section-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.vb-section-head h2{font-family:var(--display);font-size:15px;font-weight:600;}
.vb-count{background:var(--card2);color:var(--muted);font-size:11px;font-weight:600;padding:1px 8px;border-radius:20px;font-family:var(--mono);}
.vb-slip{background:var(--card);border:1px solid var(--border);border-radius:15px;padding:13px 14px;margin-bottom:9px;display:grid;grid-template-columns:1fr auto;gap:10px;cursor:pointer;transition:.15s;}
.vb-slip:hover{border-color:var(--line2);}
.vb-slip-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:5px;}
.vb-slip-league{font-size:11px;color:var(--gold);font-weight:600;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:inline-flex;align-items:center;gap:4px;}
.vb-slip-status{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;border:1px solid;padding:2px 7px;border-radius:20px;white-space:nowrap;}
.vb-slip-match{font-size:15px;font-weight:600;line-height:1.25;}
.vb-slip-pick{font-size:13px;color:var(--muted);margin-top:1px;}
.vb-slip-type{color:var(--text);}
.vb-slip-meta{display:flex;align-items:center;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-top:6px;}
.vb-slip-side{display:flex;flex-direction:column;align-items:flex-end;justify-content:center;text-align:right;border-left:1px dashed var(--border);padding-left:12px;min-width:88px;}
.vb-slip-profit{font-family:var(--mono);font-size:18px;font-weight:700;letter-spacing:-.03em;}
.vb-slip-ret{font-size:11px;color:var(--dim);margin-top:1px;}
.vb-slip-roi{font-size:11px;color:var(--muted);margin-top:1px;}
.vb-slip-pot{text-align:right;}
.vb-slip-pot-label{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.05em;}
.vb-slip-pot-val{font-size:16px;font-weight:600;color:var(--gold);margin-top:2px;}
.vb-slip-actions{grid-column:1/-1;display:flex;gap:7px;margin-top:11px;padding-top:11px;border-top:1px solid var(--line);}
.vb-act{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:4px;font-size:12.5px;font-weight:600;padding:8px 4px;border-radius:9px;border:1px solid var(--border);background:var(--card2);color:var(--muted);cursor:pointer;transition:.15s;}
.vb-act.won{color:var(--up);}.vb-act.won:hover{background:rgba(79,208,138,.14);border-color:var(--up);}
.vb-act.lost{color:var(--down);}.vb-act.lost:hover{background:rgba(242,107,107,.14);border-color:var(--down);}
.vb-act.void:hover,.vb-act.more:hover{color:var(--text);border-color:var(--line2);}
.vb-act.ghost{background:transparent;}.vb-act.ghost.danger{color:var(--down);}
.vb-daygroup{margin-bottom:18px;}
.vb-daygroup-head{display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:4px 2px 9px;}
.vb-daygroup-head .up,.vb-daygroup-head .down{font-family:var(--mono);font-size:13px;}
.vb-search-row{display:flex;gap:8px;margin-bottom:12px;}
.vb-search{flex:1;display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:0 12px;color:var(--dim);}
.vb-search input{flex:1;background:none;border:none;color:var(--text);font-size:14px;padding:11px 0;outline:none;font-family:var(--sans);}
.vb-search input::placeholder{color:var(--dim);}
.vb-search button{background:none;border:none;color:var(--dim);cursor:pointer;display:flex;padding:4px;}
.vb-filters{display:flex;gap:8px;margin-bottom:12px;}
.vb-filters select{flex:1;}
.vb-cal-head{display:flex;align-items:center;justify-content:space-between;margin:6px 0 14px;}
.vb-cal-title{text-align:center;}
.vb-cal-title>div:first-child{font-family:var(--display);font-size:17px;font-weight:600;}
.vb-cal-sub{font-size:12px;font-family:var(--mono);margin-top:1px;}
.vb-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
.vb-cal-dow{margin-bottom:5px;}
.vb-cal-wd{text-align:center;font-size:11px;color:var(--dim);font-weight:600;}
.vb-cal-cell{aspect-ratio:1;background:var(--card);border:1px solid var(--border);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:5px 2px;cursor:pointer;position:relative;transition:.12s;overflow:hidden;}
.vb-cal-cell.empty{background:transparent;border:none;cursor:default;}
.vb-cal-cell.up{background:rgba(79,208,138,.10);border-color:rgba(79,208,138,.35);}
.vb-cal-cell.down{background:rgba(242,107,107,.10);border-color:rgba(242,107,107,.35);}
.vb-cal-cell.pending{border-color:rgba(234,180,78,.4);}
.vb-cal-cell.today{box-shadow:inset 0 0 0 1.5px var(--gold);}
.vb-cal-cell.sel{outline:2px solid var(--gold);outline-offset:0;}
.vb-cal-day{font-size:12.5px;font-weight:600;color:var(--text);font-family:var(--mono);}
.vb-cal-amt{font-size:9.5px;font-family:var(--mono);font-weight:600;margin-top:2px;line-height:1;}
.vb-cal-day-detail{margin-top:18px;}
.vb-cal-day-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}
.vb-mini-add{display:inline-flex;align-items:center;gap:4px;background:rgba(234,180,78,.12);color:var(--gold);border:none;font-size:12px;font-weight:600;padding:6px 11px;border-radius:9px;cursor:pointer;}
.vb-period-nav{display:flex;align-items:center;justify-content:space-between;margin:6px 0;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:4px 6px;}
.vb-period-nav span{font-size:13.5px;font-weight:600;font-family:var(--display);}
.vb-report-hero{text-align:center;padding:16px 0 12px;}
.vb-report-profit{font-family:var(--display);font-size:36px;font-weight:700;letter-spacing:-.03em;font-variant-numeric:tabular-nums;}
.vb-report-sub{font-size:13px;font-family:var(--mono);color:var(--muted);margin-top:2px;}
.vb-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px;margin:12px 0;}
.vb-card-title{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;}
.vb-chart-md{height:170px;margin:0 -4px;}
.vb-bw{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0;}
.vb-bw-card{display:flex;gap:9px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px;}
.vb-bw-card.up{color:var(--up);}.vb-bw-card.down{color:var(--down);}
.vb-bw-label{font-size:10.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.05em;font-weight:600;}
